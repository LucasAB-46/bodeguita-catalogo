<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Bodeguita de Saraza · Catálogo Mayorista</title>
  <link rel="icon" href="https://fav.farm/🍷" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --negro: #0a0a0a; --carbon: #141414; --gris-oscuro: #1e1e1e;
      --gris-medio: #2a2a2a; --gris-borde: #333; --dorado: #e8b84b;
      --dorado-claro: #f5d078; --blanco: #f0ede8; --blanco-apagado: #b0a89a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--negro); color: var(--blanco); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }
    
    header { background: var(--carbon); border-bottom: 2px solid var(--dorado); padding: 20px 24px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
    .logo-nombre { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
    .logo-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--dorado); text-transform: uppercase; }
    
    .badge-mayorista { background: var(--dorado); color: var(--negro); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 2px; }
    .btn-contacto { border: 1px solid var(--gris-borde); color: var(--blanco-apagado); padding: 6px 14px; border-radius: 4px; text-decoration: none; transition: 0.2s; }
    .btn-contacto:hover { border-color: var(--dorado); color: var(--dorado); }

    .hero { background: linear-gradient(135deg, var(--carbon) 0%, #0f1a0f 50%, var(--carbon) 100%); padding: 48px 24px; text-align: center; border-bottom: 1px solid var(--gris-borde); }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 8vw, 72px); letter-spacing: 6px; line-height: 0.9; }
    .hero h1 span { color: var(--dorado); }
    .actualizado-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(232,184,75,0.1); border: 1px solid rgba(232,184,75,0.3); color: var(--dorado); font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-top: 15px; }
    .dot-live { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .search-bar { padding: 20px 24px; background: var(--carbon); border-bottom: 1px solid var(--gris-borde); }
    .search-input-wrap { max-width: 600px; margin: 0 auto; position: relative; }
    .search-input-wrap input { width: 100%; background: var(--gris-oscuro); border: 1px solid var(--gris-borde); color: var(--blanco); padding: 12px 16px; border-radius: 6px; outline: none; }
    .search-input-wrap input:focus { border-color: var(--dorado); }

    .filtros-wrap { padding: 16px 24px; background: var(--carbon); border-bottom: 1px solid var(--gris-borde); overflow-x: auto; }
    .filtros { display: flex; gap: 8px; width: max-content; }
    .filtro-btn { background: var(--gris-oscuro); border: 1px solid var(--gris-borde); color: var(--blanco-apagado); padding: 7px 16px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
    .filtro-btn.activo { background: var(--dorado); color: var(--negro); border-color: var(--dorado); }

    .contenido { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
    .seccion { margin-bottom: 48px; }
    .seccion-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .seccion-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; }
    .seccion-linea { flex: 1; height: 1px; background: var(--gris-borde); }

    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card { background: var(--gris-oscuro); border: 1px solid var(--gris-borde); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .card:hover { border-color: var(--dorado); transform: translateY(-2px); transition: 0.2s; }
    .card-categoria { font-size: 10px; color: var(--dorado); text-transform: uppercase; font-weight: 700; }
    .card-nombre { font-size: 17px; font-weight: 700; line-height: 1.2; }
    .precio-valor { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--blanco); background: var(--gris-medio); padding: 2px 10px; border-radius: 4px; border-left: 3px solid var(--dorado); }

    footer { background: var(--carbon); border-top: 2px solid var(--dorado); padding: 28px 24px; text-align: center; font-size: 13px; }
    .no-results { text-align: center; padding: 60px; color: var(--blanco-apagado); }

    @media (max-width: 600px) { .productos-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-nombre">La Bodeguita</div>
    <div class="logo-sub">— de Saraza —</div>
  </div>
  <div class="header-right">
    <span class="badge-mayorista">MAYORISTA</span>
    <a href="https://wa.me/5491171005183" class="btn-contacto" target="_blank">📱 Pedir</a>
  </div>
</header>

<div class="hero">
  <h1>CATÁLOGO<br><span>DE PRECIOS</span></h1>
  <div class="actualizado-badge">
    <span class="dot-live"></span>
    <span id="fecha-update">Cargando...</span>
  </div>
</div>

<div class="search-bar">
  <div class="search-input-wrap">
    <input type="text" id="buscador" placeholder="Buscá un producto... (ej: Corona, Coca, Fernet)">
  </div>
</div>

<div class="filtros-wrap">
  <div class="filtros" id="filtros">
    <button class="filtro-btn activo" data-cat="todos">Todos</button>
    <button class="filtro-btn" data-cat="Cervezas">🍺 Cervezas</button>
    <button class="filtro-btn" data-cat="Gaseosas">🥤 Gaseosas</button>
    <button class="filtro-btn" data-cat="Aguas">💧 Aguas</button>
    <button class="filtro-btn" data-cat="Vinos">🍷 Vinos</button>
    <button class="filtro-btn" data-cat="Whisky">🥃 Whisky</button>
    <button class="filtro-btn" data-cat="Fernet">🍶 Fernet</button>
    <button class="filtro-btn" data-cat="Gin">🍸 Gin</button>
    <button class="filtro-btn" data-cat="Vodka">🍹 Vodka</button>
    <button class="filtro-btn" data-cat="Energizantes">⚡ Energizantes</button>
    <button class="filtro-btn" data-cat="Licores">🍾 Licores</button>
    <button class="filtro-btn" data-cat="Snacks">🍫 Snacks</button>
  </div>
</div>

<div class="contenido" id="contenido">
  <p style="text-align: center;">Sincronizando con inventario...</p>
</div>

<footer>
  <p><strong>La Bodeguita de Saraza</strong> · CABA · 📱 11 7100-5183</p>
  <p style="color: #555; margin-top: 10px;">Precios sujetos a cambios sin previo aviso · Solo venta mayorista</p>
</footer>

<script>
let PRODUCTOS = [];
let catActiva = 'todos';
let busqueda = '';

async function cargarDatos() {
  try {
    const response = await fetch('./precios.json?v=' + new Date().getTime());
    const datosNuevos = await response.json();
    
    PRODUCTOS = datosNuevos.map(p => {
      const desc = p.descripcion.toLowerCase();
      let cat = "Otros";

      if (/(cerveza|porron|lata|corona|brahma|quilmes|stella|heineken|andes|miller|schneider|imperial|isenbeck|warsteiner|bieckert|palermo|skol|munich|361)/.test(desc)) cat = "Cervezas";
      else if (/(coca|sprite|fanta|pepsi|7up|paso de los toros|mirinda|manaos|gaseosa|cunnington|levite|baggio|cepita|aquarius|placer|ades|jugo)/.test(desc)) cat = "Gaseosas";
      else if (/(agua|villavicencio|glaciar|bidon|soda|eco de los andes|sierra de los padres|arroyito|cimes)/.test(desc)) cat = "Aguas";
      else if (/(vino|malbec|cabernet|chardonnay|syrah|merlot|espumante|chandon|trumpeter|rutini|nicasia|alamos|alma mora|dada|benjamin|colon|finca|enemigo|pispi)/.test(desc)) cat = "Vinos";
      else if (/(whisky|black label|red label|jack daniels|chivas|ballentines|jameson|old parr|white horse|moray|monkey shoulder|famous)/.test(desc)) cat = "Whisky";
      else if (/(fernet|branca|1882|buhero)/.test(desc)) cat = "Fernet";
      else if (/(gin|beefeater|tanqueray|bombay|heredero|aconcagua|merle|restinga|brighton|spirito)/.test(desc)) cat = "Gin";
      else if (/(vodka|absolut|smirnoff|sernova|skyy|nikov|maleficio|bar vodka)/.test(desc)) cat = "Vodka";
      else if (/(speed|monster|energizante|red bull|red raven)/.test(desc)) cat = "Energizantes";
      else if (/(licor|baileys|jager|amarula|campari|aperol|cinzano|gancia|cynar|martini|amaretto|sheridan|tambo|tia maria|3 plumas|cusenier)/.test(desc)) cat = "Licores";
      else if (/(alfajor|papas|snack|lays|doritos|chetos|mani|marroc|bon o bon|oreo|pepitos|nachos|toddy|mantecol|don satur|pringles)/.test(desc)) cat = "Snacks";

      return { id: p.codigo, cat: cat, nombre: p.descripcion, precio_unidad: p.precio_venta };
    });

    render();
    actualizarFecha();
  } catch (error) {
    document.getElementById('contenido').innerHTML = "<div class='no-results'>⚠️ Error al cargar precios.</div>";
  }
}

const fmt = n => n ? '$' + Number(n).toLocaleString('es-AR') : '-';

function render() {
  const contenido = document.getElementById('contenido');
  let filtrados = PRODUCTOS.filter(p => {
    const matchCat = catActiva === 'todos' || p.cat === catActiva;
    const matchBusq = p.nombre.toLowerCase().includes(busqueda.toLowerCase());
    return matchCat && matchBusq;
  });

  if (filtrados.length === 0) {
    contenido.innerHTML = `<div class="no-results">🔍 No se encontraron productos.</div>`;
    return;
  }

  const porCategoria = {};
  filtrados.forEach(p => {
    if (!porCategoria[p.cat]) porCategoria[p.cat] = [];
    porCategoria[p.cat].push(p);
  });

  const iconos = { 'Cervezas': '🍺', 'Gaseosas': '🥤', 'Aguas': '💧', 'Vinos': '🍷', 'Whisky': '🥃', 'Fernet': '🍶', 'Gin': '🍸', 'Vodka': '🍹', 'Energizantes': '⚡', 'Licores': '🍾', 'Snacks': '🍫', 'Otros': '📦' };

  contenido.innerHTML = Object.entries(porCategoria).sort().map(([cat, prods]) => `
    <div class="seccion">
      <div class="seccion-header">
        <span style="font-size:24px">${iconos[cat] || '📦'}</span>
        <h2 class="seccion-titulo">${cat.toUpperCase()}</h2>
        <div class="seccion-linea"></div>
        <span style="font-size:12px; color:var(--blanco-apagado)">${prods.length} productos</span>
      </div>
      <div class="productos-grid">
        ${prods.map(p => `
          <div class="card">
            <div class="card-categoria">${cat}</div>
            <div class="card-nombre">${p.nombre}</div>
            <div class="precio-valor">${fmt(p.precio_unidad)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function actualizarFecha() {
  const opciones = { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('fecha-update').textContent = 'Actualizado: ' + new Date().toLocaleDateString('es-AR', opciones);
}

document.getElementById('filtros').addEventListener('click', e => {
  if (!e.target.classList.contains('filtro-btn')) return;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  e.target.classList.add('activo');
  catActiva = e.target.dataset.cat;
  render();
});

document.getElementById('buscador').addEventListener('input', e => {
  busqueda = e.target.value;
  if (busqueda) {
    catActiva = 'todos';
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
    document.querySelector('[data-cat="todos"]').classList.add('activo');
  }
  render();
});

cargarDatos();
</script>
</body>
</html>
